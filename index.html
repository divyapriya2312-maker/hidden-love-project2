<!DOCTYPE html>
<html>

<head>
    <title>Hidden Love</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->

    <header>

        <div class="logo">HL</div>

       <nav>
    <a href="#">Home</a>

    <a href="menu.html">Menu</a>

    <a href="cart.html" class="cart-icon">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count">0</span>
    </a>
</nav>



    </header>

    

    <!-- Banner -->

    <section class="banner">

        <div class="slider">

            <img class="slide" src="banner1.jpg">
            <img class="slide" src="banner2.jpg">

        </div>

        <div class="banner-text">

            <h2>Limited Time Offer</h2>

            <h1>20% OFF</h1>

         <button onclick="window.location.href='menu.html'">
                Shop Now
            </button>


        </div>

    </section>


    <!-- Summer Sale -->



    <h2 class="title">Summer Sale</h2>

    <section class="products">

       <div class="card">

    <img src="foundation.jpg" alt="foundation"
         onclick="goToProduct('Foundation', 799, 'foundation.jpg')"
         style="cursor:pointer;">

    <h3 onclick="goToProduct('Foundation', 799, 'foundation.jpg')"
        style="cursor:pointer;">
        Foundation
    </h3>

    <div class="price">
        <span class="new">₹799</span>
        <span class="old">₹1000</span>
        <span class="off">20% OFF</span>
    </div>

    <button onclick="addToCart('Foundation', 799, 'foundation.jpg')">
        Add to Cart
    </button>

    <span id="qty-foundation">0</span>

</div>

        <div class="card">

    <img src="fixing-Powder.jpg" alt="fixing powder"
         onclick="goToProduct('Fixing powder', 599, 'fixing-Powder.jpg')"
         style="cursor:pointer;">

    <h3 onclick="goToProduct('Fixing powder', 599, 'fixing-Powder.jpg')"
        style="cursor:pointer;">
        Fixing-Powder
    </h3>

    <div class="price">
        <span class="new">₹599</span>
        <span class="old">₹800</span>
        <span class="off">20% OFF</span>
    </div>

    <button onclick="addToCart('Fixing powder', 599, 'fixing-Powder.jpg')">
        Add to Cart
    </button>

    <span id="qty-fixingpowder">0</span>

</div>
    </section>

    <script src="script.js"></script>

</body>

</html>
