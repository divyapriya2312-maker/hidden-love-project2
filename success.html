
<!DOCTYPE html>
<html>

<head>
    <title>Success</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #a18cd1, #fbc2eb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            color: black;
        }

        .box {
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: green;
        }

        p {
            color: gray;
        }

        .method {
            margin-top: 10px;
            font-weight: bold;
            color: #7b1c0f;
            font-size: 18px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #7b1c0f;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: black;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .back-btn:hover {
            transform: scale(1.1);
            opacity: 0.9;
        }
    </style>

</head>

<body>



    <a href="checkout.html" class="back-btn">⬅ Back</a>

    <header>
        <a href="index.html" class="logo">HL</a>
    </header>

    <div class="box">
        <h1>✅ Order Placed Successfully!</h1>
        <p>Thank you for shopping ❤️</p>

        <div class="method" id="payment"></div>

        <a href="index.html">Back to Home</a>
    </div>

    <script>
        let method = localStorage.getItem("paymentMethod");

        document.getElementById("payment").innerText =
            method ? "Payment: " + method : "Payment Completed";

        // clear cart
        localStorage.removeItem("cart");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 5000);
    </script>

</body>

</html>
