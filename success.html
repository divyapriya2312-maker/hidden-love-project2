
<!DOCTYPE html>
<html>

<head>
    <title>Success</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #a18cd1, #fbc2eb);
            margin: 0;
        }

        /* HEADER */
        header {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* LOGO */
        .logo {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;

            background: linear-gradient(45deg, #ff6a00, #ee0979);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.1);
            transition: 0.3s;
        }

        /* BACK BUTTON */
        .back-btn {
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(238, 9, 121, 0.4);
        }

        .back-btn:hover {
            transform: scale(1.1);
            opacity: 0.9;
        }

        /* BOX */
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);

            animation: pop 0.5s ease;
        }

        .box:hover {
            transform: translate(-50%, -50%) scale(1.03);
            transition: 0.3s;
        }

        /* POP ANIMATION */
        @keyframes pop {
            0% {
                transform: translate(-50%, -50%) scale(0.7);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* TEXT */
        h1 {
            color: green;
        }

        p {
            color: gray;
        }

        .method {
            margin-top: 10px;
            font-weight: bold;
            color: #7b1c0f;
            font-size: 18px;
        }

        /* BUTTON LINK */
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #7b1c0f;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }



        /* EMOJI ANIMATION */
        .box::after {
            content: "🎉🎊";
            font-size: 30px;
            display: block;
            margin-top: 10px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>


</head>

<body>



    <header>
        <a href="index.html" class="logo">HL</a>
        <a href="checkout.html" class="back-btn">⬅ Back</a>
    </header>

    <div class="box">
        <h1>✅ Order Placed Successfully!</h1>
        <p>Thank you for shopping ❤️</p>

        <div class="method" id="payment"></div>

        <a href="index.html">Back to Home</a>
    </div>

    <script>
        let method = localStorage.getItem("paymentMethod");

        document.getElementById("payment").innerText =
            method ? "Payment: " + method : "Payment Completed";

        // clear cart
        localStorage.removeItem("cart");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 5000);
    </script>

</body>

</html>
