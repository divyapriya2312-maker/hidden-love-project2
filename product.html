

<!DOCTYPE html>
<html>

<head>
    <title>Product Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #ffe4e1, #fff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .product-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease;
        }

        .product-box img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        #p-name {
            font-size: 22px;
            margin: 10px 0;
        }

        #p-price {
            color: #ee0979;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .back {
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: gray;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        .top-bar {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    text-decoration: none;
    color: black;
}

.back-btn {
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 14px;
}
        #p-desc {
    text-align: left;
    margin-top: 10px;
    color: #555;
    font-size: 14px;
}

#p-desc li {
    margin-bottom: 6px;
}
        
    </style>
</head>

<body>

    <header class="top-bar">
    <a href="index.html" class="logo">HL</a>

    <a href="index.html" class="back-btn">⬅ Back</a>
</header>

<div class="product-box">

    <img id="p-img">

    <h1 id="p-name"></h1>

    <h2 id="p-price"></h2>

    <!-- 🔥 Description -->
    <ul id="p-desc"></ul>

    <button class="btn" onclick="addToCart()">Add to Cart</button>

    <a href="cart.html" class="cart-icon">
    <i class="fa-solid fa-cart-shopping"></i>
    <span id="cart-count">0</span>
</a>

    <button class="btn" onclick="goBack()">⬅ Back</button>


    <p>Best quality product with amazing offer 🎉</p>    

</div>

<script>
let product = JSON.parse(localStorage.getItem("selectedProduct"));
if(product){
    document.getElementById("p-name").innerText = product.name;
    document.getElementById("p-price").innerText = "₹" + product.price;
    document.getElementById("p-img").src = product.image;

    if(product.desc){  // 🔥 IMPORTANT CHECK
        let descArr = product.desc.split("|");

        let descHTML = "";
        descArr.forEach(d => {
            descHTML += `<li>${d.trim()}</li>`;
        });

        document.getElementById("p-desc").innerHTML = descHTML;
    }
}
function addToCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(
        item => item.name.toLowerCase() === product.name.toLowerCase()
    );

    if (existing) {
        existing.qty += 1;
    } else {
        cart.push({
            name: product.name,
            price: product.price,
            image: product.image,
            qty: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount(); // 🔥 IMPORTANT
}function goBack() {
    window.history.back();
}
    function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let count = 0;

    cart.forEach(item => count += item.qty);

    let el = document.getElementById("cart-count");

    if (el) {
        el.innerText = count;
    }
}
    updateCartCount();
</script>

</body>
</html>
